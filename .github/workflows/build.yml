name: Build NovaClient

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 4.10.3

      # setupCIWorkspace is ForgeGradle's lightweight setup task made for
      # automated builds: it fetches/deobfuscates Minecraft without doing
      # the full IDE decompile step, which is faster and enough to compile.
      - name: Setup ForgeGradle CI workspace
        run: gradle setupCIWorkspace --stacktrace

      - name: Build mod jar
        run: gradle build --stacktrace

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: NovaClient-jar
          path: build/libs/*.jar
          if-no-files-found: error
